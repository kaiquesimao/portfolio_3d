name: Deploy to Cloudflare

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check

  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec opennextjs-cloudflare build
      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          packageManager: pnpm
        env:
          NEXT_EMAILJS_SERVICEID: ${{ secrets.NEXT_EMAILJS_SERVICEID }}
          NEXT_EMAILJS_TEMPLATEID: ${{ secrets.NEXT_EMAILJS_TEMPLATEID }}
          NEXT_EMAILJS_OPTIONS: ${{ secrets.NEXT_EMAILJS_OPTIONS }}
          NEXT_EMAILJS_PRIVATEKEY: ${{ secrets.NEXT_EMAILJS_PRIVATEKEY }}

  deploy-production:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec opennextjs-cloudflare build
      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          packageManager: pnpm
        env:
          NEXT_EMAILJS_SERVICEID: ${{ secrets.NEXT_EMAILJS_SERVICEID }}
          NEXT_EMAILJS_TEMPLATEID: ${{ secrets.NEXT_EMAILJS_TEMPLATEID }}
          NEXT_EMAILJS_OPTIONS: ${{ secrets.NEXT_EMAILJS_OPTIONS }}
          NEXT_EMAILJS_PRIVATEKEY: ${{ secrets.NEXT_EMAILJS_PRIVATEKEY }}
